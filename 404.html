<script>
// PARTICLES
(function(){const c=document.getElementById('c'),ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;window.addEventListener('resize',()=>{c.width=innerWidth;c.height=innerHeight;});const cols=['rgba(230,57,70,','rgba(45,198,83,','rgba(255,214,10,'];const pts=Array.from({length:35},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.8+0.4,vx:(Math.random()-0.5)*0.35,vy:(Math.random()-0.5)*0.35,a:Math.random()*0.4+0.08,col:cols[Math.floor(Math.random()*cols.length)]}));function draw(){ctx.clearRect(0,0,c.width,c.height);pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.col+p.a+')';ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>c.width)p.vx*=-1;if(p.y<0||p.y>c.height)p.vy*=-1;});requestAnimationFrame(draw);}draw();})();

// COUNTDOWN REDIRECT
let count=10;
const cd=document.getElementById('countdown');
const iv=setInterval(()=>{count--;cd.textContent=count;if(count<=0){clearInterval(iv);window.location.href='index.html';}},1000);
// Stop countdown if user interacts
document.addEventListener('click',()=>clearInterval(iv),{once:true});
document.addEventListener('keydown',()=>clearInterval(iv),{once:true});


</script>

        line-height:1.6;font-family:'Space Grotesk',sans-serif;word-break:break-word;}
      .gm-msg.bot{background:rgba(255,255,255,0.06);color:#e8e8f0;
        border-bottom-left-radius:4px;align-self:flex-start;}
      .gm-msg.user{background:linear-gradient(135deg,#e63946,#c1121f);color:#fff;
        border-bottom-right-radius:4px;align-self:flex-end;}
      .gm-msg.typing{background:rgba(255,255,255,0.04);}
      .gm-dots{display:inline-flex;gap:4px;align-items:center;padding:0.2rem 0;}
      .gm-dots span{width:6px;height:6px;background:#888899;border-radius:50%;
        animation:gmDot 1.2s infinite;}
      .gm-dots span:nth-child(2){animation-delay:0.2s;}
      .gm-dots span:nth-child(3){animation-delay:0.4s;}
      @keyframes gmDot{0%,80%,100%{transform:scale(0.6);opacity:0.4;}40%{transform:scale(1);opacity:1;}}
      .gm-chips{display:flex;flex-wrap:wrap;gap:0.4rem;padding:0 1rem 0.6rem;}
      .gm-chip{padding:0.3rem 0.75rem;border-radius:50px;border:1px solid rgba(255,255,255,0.1);
        background:rgba(255,255,255,0.04);color:#888899;font-size:0.73rem;cursor:pointer;
        transition:all 0.2s;font-family:'Space Grotesk',sans-serif;white-space:nowrap;}
      .gm-chip:hover{border-color:#2dc653;color:#2dc653;}
      .gm-chat-input-row{padding:0.75rem 1rem;border-top:1px solid rgba(255,255,255,0.08);
        display:flex;gap:0.5rem;border-radius:0 0 20px 20px;}
      .gm-chat-input{flex:1;background:rgba(255,255,255,0.05);
        border:1.5px solid rgba(255,255,255,0.08);border-radius:10px;
        padding:0.6rem 0.85rem;color:#e8e8f0;font-family:'Space Grotesk',sans-serif;
        font-size:0.83rem;outline:none;transition:border-color 0.2s;}
      .gm-chat-input:focus{border-color:#2dc653;}
      .gm-chat-input::placeholder{color:#555566;}
      .gm-chat-send{width:36px;height:36px;border-radius:10px;border:none;cursor:pointer;
        background:linear-gradient(135deg,#e63946,#c1121f);color:#fff;
        display:flex;align-items:center;justify-content:center;font-size:1rem;
        flex-shrink:0;align-self:center;transition:transform 0.2s;}
      .gm-chat-send:hover{transform:scale(1.08);}
      .gm-wa-link{color:#25d366;text-decoration:none;font-weight:600;}
      .gm-wa-link:hover{text-decoration:underline;}
      @media(max-width:480px){
        .gm-chat-panel{width:calc(100vw - 2rem);right:1rem;bottom:5rem;}
        .gm-chat-bubble{bottom:1.5rem;right:1rem;}
      }
    `;
    document.head.appendChild(style);

    const chips=getChips();
    const html=`
      <button class="gm-chat-bubble" id="gmBubble" onclick="gmToggle()" title="Ask GhostBot">👻</button>
      <div class="gm-chat-panel" id="gmPanel">
        <div class="gm-chat-head">
          <div class="gm-chat-avatar">👻</div>
          <div class="gm-chat-info">
            <strong>GhostBot</strong>
            <span>● Online — ask me anything</span>
          </div>
          <button class="gm-chat-close" onclick="gmToggle()">✕</button>
        </div>
        <div class="gm-chat-messages" id="gmMsgs"></div>
        <div class="gm-chips" id="gmChips">
          ${chips.map(c=>`<span class="gm-chip" onclick="gmChip(this)">${c}</span>`).join('')}
        </div>
        <div class="gm-chat-input-row">
          <input class="gm-chat-input" id="gmInput" placeholder="Ask GhostBot anything..."
            maxlength="300" onkeydown="if(event.key==='Enter')gmSend()"/>
          <button class="gm-chat-send" onclick="gmSend()">➤</button>
        </div>
      </div>
    `;
    const wrap=document.createElement('div');
    wrap.innerHTML=html;
    document.body.appendChild(wrap);
  }

  // ---- ACTIONS ----
  window.gmToggle=function(){
    gmOpen=!gmOpen;
    document.getElementById('gmPanel').classList.toggle('open',gmOpen);
    document.getElementById('gmBubble').textContent=gmOpen?'✕':'👻';
    if(gmOpen){
      if(!document.getElementById('gmMsgs').children.length){
        setTimeout(()=>addMsg('bot',
          "Hey! 👻 I'm GhostBot, your GhostMessage assistant.<br>Ask me anything about the platform, and I'll do my best to help!"),300);
      }
      setTimeout(()=>document.getElementById('gmInput').focus(),400);
    }
  };

  window.gmChip=function(el){
    document.getElementById('gmChips').style.display='none';
    const q=el.textContent;
    addMsg('user',q);
    setTimeout(()=>respond(q),400);
  };

  window.gmSend=function(){
    const inp=document.getElementById('gmInput');
    const q=inp.value.trim();
    if(!q)return;
    inp.value='';
    document.getElementById('gmChips').style.display='none';
    addMsg('user',q);
    setTimeout(()=>respond(q),400);
  };

  function respond(q){
    // Show typing indicator
    const typing=addMsg('bot','<div class="gm-dots"><span></span><span></span><span></span></div>');
    typing.classList.add('typing');
    // Slight delay to feel natural
    const delay=600+Math.random()*600;
    setTimeout(()=>{
      typing.remove();
      addMsg('bot',getAnswer(q));
    },delay);
  }

  function addMsg(role,html){
    const d=document.createElement('div');
    d.className='gm-msg '+role;
    d.innerHTML=html;
    const msgs=document.getElementById('gmMsgs');
    msgs.appendChild(d);
    msgs.scrollTop=99999;
    return d;
  }

  // Init on DOM ready
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',init);
  } else {
    init();
  }
})();

</script>
</body>
</html>
